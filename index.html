<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra Fatalis | PvM Class Calculator</title>
    <link rel="icon" type="image/png" href="Assets/tf-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030303;
            --text-color: #ffffff;
            --accent-blood: #ff2d2d;
            --accent-blood-glow: rgba(255, 45, 45, 0.5);
            --royal-gold: #D4AF37;
            --royal-gold-glow: rgba(212, 175, 55, 0.4);
            --card-bg: rgba(10, 10, 10, 0.85);
            --card-border: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(7, 7, 7, 0.92);
            --font-main: 'Inter', sans-serif;
            --font-heading: 'Outfit', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            outline: none;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: url('Assets/background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }



        /* THEME BACKGROUND VIDEO */
        .bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -3;
            object-fit: cover;
            opacity: 0.6;
            filter: brightness(0.7) contrast(1.2);
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(3, 3, 3, 0.4) 40%, rgba(3, 3, 3, 0.9) 100%);
            z-index: -2;
            pointer-events: none;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 40px 20px 100px;
            width: 100%;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 60px;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 40px;
        }

        .logo {
            max-width: 500px;
            filter: drop-shadow(0 0 20px var(--accent-blood-glow));
            transition: var(--transition);
        }

        .header-icon-small {
            width: 32px;
            height: 32px;
            filter: drop-shadow(0 0 8px var(--accent-blood-glow));
        }

        .sticky-tracker {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(7, 7, 7, 0.98));
            backdrop-filter: blur(30px);
            padding: 10px 40px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        .tracker-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .active-class-badge {
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--accent-blood);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-left: 2px solid var(--accent-blood);
            padding-left: 15px;
        }

        .points-display-main {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .points-val-large {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 900;
            line-height: 1;
            color: var(--accent-blood);
            text-shadow: 0 0 15px var(--accent-blood-glow);
        }

        .points-label-small {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            opacity: 0.7;
            margin-top: 4px;
            transition: var(--transition);
        }

        .points-label-small.maniacal-glow {
            color: var(--accent-blood);
            text-shadow: 0 0 10px var(--accent-blood-glow), 0 0 20px var(--accent-blood);
            opacity: 1;
            font-weight: 900;
            animation: maniacalPulse 1.5s infinite alternate;
        }

        @keyframes maniacalPulse {
            from { transform: scale(1); filter: brightness(1); }
            to { transform: scale(1.1); filter: brightness(1.5); }
        }

        .class-select-box {
            background: #111;
            border: 1px solid var(--card-border);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-family: var(--font-heading);
            cursor: pointer;
            transition: var(--transition);
            font-size: 1rem;
        }

        .btn-system {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .btn-system:hover { border-color: var(--accent-blood); background: rgba(255,45,45,0.1); }

        .btn-reset {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.6);
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-family: var(--font-heading);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            transition: var(--transition);
        }

        .btn-reset:hover {
            border-color: var(--accent-blood);
            color: var(--accent-blood);
            background: rgba(255, 45, 45, 0.05);
        }

        .btn-reset.gold {
            border-color: var(--royal-gold);
            color: var(--royal-gold);
        }

        .section-title {
            font-family: var(--font-heading);
            font-size: 2rem;
            margin: 60px 0 30px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 20px;
            color: #fff;
        }

        .section-title::before {
            content: "";
            width: 40px;
            height: 2px;
            background: var(--accent-blood);
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 30px;
        }

        .skill-card {
            background-image: linear-gradient(rgba(10, 10, 10, 0.7), rgba(10, 10, 10, 0.7)), url('Assets/skill-card-bg-v2.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            backdrop-filter: blur(15px);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 35px;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        /* Flash Layer - Freed from resting state */
        .skill-card::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('Assets/skill-card-bg-v2.png');
            background-size: cover;
            background-position: center;
            opacity: 0;
            z-index: 1;
            pointer-events: none;
            border-radius: 28px;
            transition: opacity 0.3s ease;
        }

        .skill-card.max-flash::after {
            animation: cardFreedFlash 1.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        @keyframes cardFreedFlash {
            0% { opacity: 0; filter: brightness(1) contrast(1); transform: scale(1); }
            15% { opacity: 1; filter: brightness(2) contrast(1.2); transform: scale(1.02); }
            100% { opacity: 0; filter: brightness(1) contrast(1); transform: scale(1); }
        }

        /* Subtle glow on the card itself during flash */
        .skill-card.max-flash {
            animation: cardGlowBurst 1.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        @keyframes cardGlowBurst {
            0% { border-color: var(--card-border); box-shadow: 0 0 0 rgba(255, 255, 255, 0); }
            15% { border-color: rgba(255, 255, 255, 0.6); box-shadow: 0 0 30px rgba(255, 255, 255, 0.3); }
            100% { border-color: var(--card-border); box-shadow: 0 0 0 rgba(255, 255, 255, 0); }
        }

        /* Ensure content stays above the flash layer */
        .skill-header, .rank-controls, .skill-desc, .capstone-box {
            position: relative;
            z-index: 2;
        }

        .skill-card:hover {
            transform: translateY(-5px) scale(1.01);
            border-color: rgba(255, 45, 45, 0.3);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .skill-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 25px;
            gap: 15px;
        }

        .skill-name {
            font-family: var(--font-heading);
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
            word-break: break-word;
        }

        .skill-flavor-top {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            letter-spacing: 0.05em;
            margin-top: 4px;
            font-family: var(--font-main);
            text-transform: none;
        }

        .rank-badge {
            background: #151515;
            padding: 6px 14px;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 0.9rem;
            color: var(--accent-blood);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .rank-badge.active {
            color: var(--royal-gold);
            border-color: var(--royal-gold);
            box-shadow: 0 0 10px var(--royal-gold-glow);
        }

        .rank-badge.max {
            color: #fff;
            background: var(--royal-gold);
            border-color: var(--royal-gold);
            box-shadow: 0 0 20px var(--royal-gold-glow);
        }

        .rank-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            position: relative;
        }

        .skill-metadata-right {
            margin-left: auto;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .skill-type-tag {
            font-size: 0.7rem;
            font-weight: 900;
            color: var(--accent-blood);
            text-transform: uppercase;
        }

        .skill-cost-tag {
            font-size: 0.75rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            font-family: var(--font-main);
        }

        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03);
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover:not(:disabled) {
            background: var(--accent-blood);
            border-color: var(--accent-blood);
            box-shadow: 0 0 15px var(--accent-blood-glow);
        }

        .control-btn:disabled {
            opacity: 0.1;
            cursor: not-allowed;
        }

        .skill-desc {
            font-size: 1rem;
            line-height: 1.6;
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
            min-height: 4.8em;
        }

        .val-hl { color: var(--accent-blood); font-weight: 700; }

        .capstone-box {
            margin-top: auto;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 20px;
            padding: 22px;
            transition: var(--transition);
        }

        .capstone-box.unlocked {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(0,0,0,0));
            border: 1px solid var(--royal-gold);
            box-shadow: inset 0 0 25px rgba(212, 175, 55, 0.05);
        }

        .capstone-title {
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--royal-gold);
            margin-bottom: 8px;
        }

        .utility-box {
            background: var(--glass-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: var(--transition);
        }

        .util-select-v2 {
            width: 100%;
            background: #0a0a0a;
            color: #fff;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            font-family: var(--font-heading);
            font-weight: 600;
        }

        .effect-leg { 
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            margin-top: 10px;
            padding-top: 10px;
            color: var(--royal-gold);
            font-weight: 600;
        }

        footer {
            margin-top: 100px;
            padding: 60px;
            text-align: center;
        }

        @media (max-width: 900px) {
            .container { padding: 10px 10px 100px; }
            
            .logo { max-width: 180px; }
            .logo-container { margin-bottom: 20px; }
            .header-icon-small { width: 24px; height: 24px; }

            .sticky-tracker { 
                flex-direction: row; 
                flex-wrap: wrap;
                gap: 10px; 
                padding: 10px 15px;
                justify-content: space-between;
            }
            
            .tracker-left { 
                flex-direction: row; 
                width: auto;
                gap: 8px;
                flex: 1;
            }
            
            .class-select-box { 
                padding: 6px 10px;
                font-size: 0.85rem;
                flex: 1;
            }

            .btn-reset { 
                padding: 6px 10px;
                font-size: 0.7rem;
                width: auto;
            }

            .btn-system {
                padding: 6px 8px;
                font-size: 0.8rem;
            }

            .points-display-main { 
                align-items: flex-end; 
                width: auto;
                border-top: none;
                padding-top: 0;
            }
            
            .points-val-large { font-size: 1.4rem; }
            .points-label-small { font-size: 0.5rem; letter-spacing: 0.1em; }

            .section-title { 
                font-size: 1.2rem; 
                margin: 20px 0 15px;
            }
            
            .section-title::before { display: none; }

            .skills-grid { 
                grid-template-columns: 1fr; 
                gap: 15px;
            }

            .skill-card { padding: 25px; border-radius: 20px; }
            
            .skill-name { font-size: 1.3rem; }
            
            .rank-controls { gap: 10px; }
            
            .control-btn { width: 44px; height: 44px; }
        }

        /* Support for very small screens */
        @media (max-width: 480px) {
            .points-val-large { font-size: 1.8rem; }
            .logo { max-width: 260px; }
        }
    </style>
</head>

<body>

    <div class="bg-overlay"></div>

    <!-- STICKY HEADER AT TOP -->
    <div class="sticky-tracker">
        <div class="tracker-left">
            <img src="Assets/tf-icon.png" alt="Icon" class="header-icon-small">
            <select id="classSelect" class="class-select-box" onchange="changeClass()"></select>
            <button class="btn-reset gold" onclick="resetEverything()">Global Reset</button>
            <button id="muteBtn" class="btn-system" onclick="toggleMute()" title="Toggle Music">🔊</button>
        </div>
        
        <div class="points-display-main">
            <div class="points-val-large" id="pointsRemaining">50 / 50</div>
            <div class="points-label-small">Maniacal Energy</div>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="logo-container">
                <img src="Assets/tf-logo.png" alt="Terra Fatalis" class="logo">
            </div>
        </header>

        <audio id="bgMusic" loop>
            <source src="Assets/Terra Fatalis Instrumental.mp3" type="audio/mpeg">
        </audio>

        <audio id="unlockSound">
            <source src="Assets/Unlock.mp3" type="audio/mpeg">
        </audio>

        <div class="section-title">Core Disciplines</div>
        <div class="skills-grid" id="skillsContainer"></div>

        <div class="section-title">Sacred Specializations</div>
        <div class="skills-grid" id="utilityContainer"></div>

        <footer>
            <div style="font-size: 0.7rem; letter-spacing: 0.4em; opacity: 0.4; text-transform: uppercase;">Terra Fatalis &copy; 2026</div>
        </footer>
    </div>

    <script>
        const MAX_POINTS = 50;
                                                                                                                                                                                                                                      const classes = [
            {
                name: "Arcanist", archetype: "caster",
                skills: [
                    { id: "arc_s1", name: "Arcane Nova", type: ".s1 Active", flavor: "AoE burst. Fire + Energy Damage", cost: "Cost: 25 Mana", getDesc: (r) => `ability damage <span class="val-hl">+${r * 3}%</span>; radius <span class="val-hl">${(r * +0.3).toFixed(1)}</span> tiles; CD <span class="val-hl">${(14.5 - (r * 0.5)).toFixed(1)}s</span>.`, capName: "Supernova", capDesc: "Pulls creatures inward; Leaves 20% Energy DoT field; Summons 2 ArcanistClones.", rank: 0 },
                    { id: "arc_s2", name: "Elemental Surge", type: ".s2 Active", flavor: "timed buff", cost: "Cost: 15 Mana", getDesc: (r) => `ability damage <span class="val-hl">+${r * 2}%</span>; mana cost <span class="val-hl">${(r * +1) > 0 ? "+" : ""}${r * +1}%</span>; CD <span class="val-hl">${(14.5 - (r * 0.5)).toFixed(1)}s</span>. Duration 10s.`, capName: "Arcane Storm", capDesc: "During buff, spells splash to 5 targets at 50% potency. 10% chance to summon a clone on splash.", rank: 0 },
                    { id: "arc_s3", name: "Blink", type: ".s3 Active", flavor: "mobility", cost: "Cost: 15 Mana", getDesc: (r) => `blink range <span class="val-hl">${(r * +0.2).toFixed(1)}</span> tiles; CD <span class="val-hl">${(9.5 - (r * 0.5)).toFixed(1)}s</span>. Leaves 1 ArcanistClone at origin.`, capName: "Mirror Image", capDesc: "Leaves 2 ArcanistClones at origin. All clones gain explosion-on-death.", rank: 0 },
                    { id: "arc_p1", name: "Spellweave", type: "Passive", flavor: "passive rotation", cost: "", getDesc: (r) => `bonus damage <span class="val-hl">${(r * +2) > 0 ? "+" : ""}${r * +2}%</span>; Applied to elemental pair follow-ups.`, capName: "Arcane Overload", capDesc: "Completing all pairs triggers a detonation and -30% resistance debuff for 10s.", rank: 0 },
                    { id: "arc_p2", name: "Arcane Ward", type: "Passive", flavor: "passive defense", cost: "", getDesc: (r) => `curse chance <span class="val-hl">${(r * +3) > 0 ? "+" : ""}${r * +3}%</span>; paralyze chance <span class="val-hl">${(r * +1) > 0 ? "+" : ""}${r * +1}%</span>; reflection chance <span class="val-hl">${(r * +1.5) > 0 ? "+" : ""}${r * +1.5}%</span>. Reactive defense when hit.`, capName: "Death's Echo", capDesc: "Below 30% HP, gain Invisibility and spawn 2 clones that detonate after 4s (60s ICD).", rank: 0 },
                    { id: "arc_p3", name: "Mana Well", type: "Passive", flavor: "passive sustain", cost: "", getDesc: (r) => `mana bonus <span class="val-hl">${(r * +3) > 0 ? "+" : ""}${r * +3}%</span>; mana regen <span class="val-hl">${r * +1}</span> points; Damage-to-mana conversion capped at 50%.`, capName: "Deep Well", capDesc: "Standing still for 3s triples mana regen. Grants fizzle immunity in PvM.", rank: 0 }
                ]
            },
            {
                name: "Berzerker", archetype: "2H melee",
                skills: [
                    { id: "ber_s1", name: "Whirlwind Strike", type: ".s1 Active", flavor: "AoE melee. Physical (80% Physical / 20% Fire during Bloodlust) Damage", cost: "Cost: 20 Stamina", getDesc: (r) => `ability damage <span class="val-hl">+${r * 3}%</span>; pack bonus <span class="val-hl">${(r * +1) > 0 ? "+" : ""}${r * +1}%</span>; CD <span class="val-hl">${(14.5 - (r * 0.5)).toFixed(1)}s</span>.`, capName: "Vortex", capDesc: "Whirlwind pulls creatures within 3 tiles inward before striking. Refunds 1s of cooldown per creature hit, up to 4s total.", rank: 0 },
                    { id: "ber_s2", name: "Bloodlust", type: ".s2 Active", flavor: "self buff", cost: "Cost: 10 HP", getDesc: (r) => `ability damage <span class="val-hl">+${r * 4}%</span>; CD <span class="val-hl">${(19 - (r * 1)).toFixed(1)}s</span>.`, capName: "Hemorrhage", capDesc: "During Bloodlust, each melee hit applies a bleed stack to the target (max 3 stacks). Each stack deals 2 damage every 2s for 6s.", rank: 0 },
                    { id: "ber_s3", name: "Blood Fury", type: ".s3 Active", flavor: "attack speed buff", cost: "Cost: 15 Stamina (activation) + 8 Stamina per swing", getDesc: (r) => `attack speed reduction <span class="val-hl">${(r * +0.25).toFixed(1)}</span> s; CD <span class="val-hl">${(30 - (r * 1)).toFixed(1)}s</span>. Ends early if Stamina reaches 0.`, capName: "Adrenaline Rush", capDesc: "When Blood Fury ends, 50% of the stamina consumed during the buff is regenerated over 4 seconds.", rank: 0 },
                    { id: "ber_p1", name: "Heavy Momentum", type: "Passive", flavor: "passive penetration", cost: "", getDesc: (r) => `armor penetration <span class="val-hl">${r * +2}</span> points; Applies to auto-attacks and physical class abilities.`, capName: "Sunder Armor", capDesc: "Every 4th consecutive melee hit on the same creature applies Sunder Armor: -10 armor for 10s, stacks up to 2 times.", rank: 0 },

            {

                    { id: "mar_p2", name: "Precise Strikes", type: "Passive", flavor: "passive crits", cost: "", getDesc: (r) => `critical chance <span class="val-hl">${(r * +1) > 0 ? "+" : ""}${r * +1}%</span>; Applies to all bow attacks vs creatures.`, capName: "Executioner", capDesc: "critical strikes deal +50% damage to targets below 20% HP.", rank: 0 },
                    { id: "mar_p3", name: "Hunter's Mark", type: "Passive", flavor: "passive debuff", cost: "", getDesc: (r) => `damage bonus <span class="val-hl">${(r * +0.5) > 0 ? "+" : ""}${r * +0.5}%</span>; duration <span class="val-hl">${r * +1}</span> s; First hit automatically marks the target.`, capName: "Blood Trail", capDesc: "mark spreads to nearby enemies and applies bleed on target death or trap trigger.", rank: 0 }

            },

                    { id: "tem_s3", name: "Provoke", type: ".s3 Active", flavor: "thorns + taunt", cost: "Cost: 10 Stamina", getDesc: (r) => `passive reflect <span class="val-hl">${(r * +2) > 0 ? "+" : ""}${r * +2}%</span>; duration <span class="val-hl">${(r * +0.5).toFixed(1)}</span> s; CD <span class="val-hl">${(14.5 - (r * 0.5)).toFixed(1)}s</span>. Reflected damage is 6x during the active window.`, capName: "Martyr's Wrath", capDesc: "When the taunt expires, all accumulated reflected damage detonates as a single burst.", rank: 0 },
                    { id: "tem_p1", name: "Guardian's Zeal", type: "Passive", flavor: "parry stance", cost: "", getDesc: (r) => `parry chance <span class="val-hl">${(r * +2) > 0 ? "+" : ""}${r * +2}%</span>; Applies with shield or two-handed weapon equipped.`, capName: "Shield Slam", capDesc: "On a successful parry, 20% chance to stagger the attacker for 1s (ICD 6s).", rank: 0 },
                    { id: "tem_p2", name: "Retribution", type: "Passive", flavor: "passive retaliation", cost: "", getDesc: (r) => `retaliation chance <span class="val-hl">${(r * +2) > 0 ? "+" : ""}${r * +2}%</span>; Fires when hit by a creature.`, capName: "Holy Chain", capDesc: "Retribution hits arc to a second nearby creature for 50% damage.", rank: 0 },
                    { id: "tem_p3", name: "Sacred Intercession", type: "Passive", flavor: "reactive support", cost: "", getDesc: (r) => `heal power <span class="val-hl">${(r * +5.0).toFixed(1)}</span> points; cooldown <span class="val-hl">${r * -1}</span> s (base 18s). Power scales based on virtual Magery.`, capName: "Sanctified Aegis", capDesc: "whenever the reactive heal triggers, it also refreshes defensive buffs on nearby allies.", rank: 0 }
                ]
            }
        ];

        const skillData = [
            { name: "Alchemy", gm: "Throwing an Explosion Potion at a creature deals bonus Fire damage scaling with Alchemy (10s CD).", leg: "*Transmutation* - 15% chance on a killing blow to generate a random potion in your backpack." },
            { name: "Anatomy", gm: "Up to 15% chance on melee hit to deal an extra 20% of the attack's damage as AR-ignoring physical damage.", leg: "Vital Strikes also debilitate the creature, reducing their damage by 10% for 4s." },
            { name: "Archery", gm: "Up to 10% chance on bow hit to root the creature in place for 1.5s.", leg: "Proc effect and 50% of strike's damage splash to a second nearby target." },
            { name: "Begging", gm: "Up to 10% chance when targeted to force a creature to hesitate for 1.5s.", leg: "The hesitating creature also suffers a -25% damage penalty on their next attack." },
            { name: "Camping", gm: "Standing still for 3s grants up to +2 HP/Stam/Mana regen/s to yourself and nearby allies.", leg: "The aura also grants flat 5% damage reduction against creatures." },
            { name: "Evaluating Intelligence", gm: "Up to 15% chance on spell hit to reduce all elemental resistances (Fire/Cold/Energy/Poison) by 20% for 5s (snapshot of current resist at proc time). Stacks additively with Arcane Overload and Curse of Decay — all three debuffs accumulate simultaneously on the same target using independent mod slots.", leg: "Striking a flawed creature with a class ability causes an elemental detonation." },
            { name: "Fencing", gm: "Up to 10% chance on fencing hit to mark your next attack to ignore 50% AR.", leg: "Proc effect and 50% of strike's damage splash to a second nearby target." },
            { name: "Forensic Evaluation", gm: "Killing a creature restores up to 10% of your missing HP and Stamina.", leg: "Grants +5% swing/cast speed for 5s upon triggering Blood Sense." },
            { name: "Hiding", gm: "Up to 10% chance when taking physical damage from a creature to nullify the hit and drop aggro.", leg: "Fading guarantees your next attack within 4s is a critical strike (or +50% spell damage)." },
            { name: "Inscription", gm: "Up to 15% chance when casting a spell to skip reagent and mana consumption.", leg: "*Runic Warding* - When a creature would deal you a killing blow, absorb it and restore 15% max HP (5m CD)." },
            { name: "Item Identification", gm: "Up to 10% chance when taking elemental damage to gain 50% resistance to that element for 4s.", leg: "You absorb shielded damage directly into your Mana pool." },
            { name: "Macing", gm: "Up to 10% chance on macing hit to boost your Critical Strike chance by 15% for 3s.", leg: "*Shatter* - Landing a crit while Crushing Blow is active deals an additional 50% physical burst." },
            { name: "Magery", gm: "Up to 10% chance when casting an offensive spell to auto-duplicate it at 50% damage on a nearby creature.", leg: "*Archmage's Focus* - Echo deals 100% damage and restores 5 mana." },
            { name: "Magic Resist", gm: "Up to 15% chance when taking creature spell damage to convert 20% of it into HP.", leg: "*Aegis* - 5% chance to completely nullify incoming creature spell damage and reflect it back." },
            { name: "Meditation", gm: "When mana drops below 30%, auto-restore up to 30 Mana (30s cooldown).", leg: "Adrenaline Rush also causes your next class ability to cost 0 resources." },
            { name: "Parry", gm: "Up to 15% chance on successful parry to reflect 30% of the creature's damage back.", leg: "*Phalanx* - Reflecting damage also grants you a temporary HP shield equal to the amount reflected for 5s." },
            { name: "Poisoning", gm: "Up to 15% chance on melee hit or offensive spell to inflict a stacking Poison DoT.", leg: "*Venomous Catalyst* - Hitting a poisoned creature with a class ability consumes the poison for instant damage." },
            { name: "Remove Trap", gm: "Up to 15% chance when a creature moves adjacent to snare it for 2s (10s internal CD).", leg: "The snare also explodes for moderate Fire Ability Damage." },
            { name: "Stealing", gm: "Up to 15% chance on melee hit to steal 10 Stamina from the creature and slow its next swing.", leg: "Also pilfers small amounts of gold directly into your backpack on proc." },
            { name: "Swordsmanship", gm: "Up to 10% chance on sword hit to apply Severe Bleed (physical DoT).", leg: "Proc effect and 50% of strike's damage splash to a second nearby target." },
            { name: "Tactics", gm: "Up to 10% chance when struck by a creature to refund 2s off all class active cooldowns.", leg: "After resetting, your next class ability deals +25% damage." },
            { name: "Taste Identification", gm: "Up to 15% chance when below 50% HP to simulate a Greater Heal potion (20s internal CD).", leg: "The simulated potion also grants Total Refresh and Cure effects." },
            { name: "Tracking", gm: "Grants up to +5% swing speed & ability damage against the most recently killed creature *type*.", leg: "10% chance on hit to apply Marked for Death (+15% damage from all sources for 4s)." }
        ];

        let activeClassIndex = 0;
        let selectedSkills = [null, null, null, null, null];
        let legendaryStates = [false, false, false, false, false];

        function init() {
            const select = document.getElementById('classSelect');
            classes.forEach((c, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = c.name;
                select.appendChild(opt);
            });
            render();
            renderUtilities();
        }

        function changeClass() {
            activeClassIndex = parseInt(document.getElementById('classSelect').value);
            render();
        }

        function getPointsSpent() {
            let spent = 0;
            classes[activeClassIndex].skills.forEach(s => {
                if (s.rank <= 11) spent += s.rank;
                else spent += 15;
            });
            return spent;
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (type === 'lock') {
                const snd = document.getElementById('unlockSound');
                if (snd) {
                    snd.volume = 0.3;
                    snd.currentTime = 0;
                    snd.play().catch(() => {});
                }
                return;
            }

            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            if (type === 'add') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            } else if (type === 'sub') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.05);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            } else if (type === 'reset') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            }

            osc.start(now);
            osc.stop(now + 0.1);
        }

        let flashSkillId = null;
        function updateRank(skillId, delta) {
            const skill = classes[activeClassIndex].skills.find(s => s.id === skillId);
            const totalSpent = getPointsSpent();
            const available = MAX_POINTS - totalSpent;

            if (delta > 0) {
                if (skill.rank < 11 && available >= 1) {
                    skill.rank++;
                    playSound('add');
                } else if (skill.rank === 11 && available >= 4) {
                    skill.rank = 12;
                    playSound('lock');
                    // Only set flash for this specific skill reaching 12/12
                    flashSkillId = skillId;
                    setTimeout(() => { flashSkillId = null; }, 1500);
                }
            } else {
                // Clear flash state when removing points
                if (flashSkillId === skillId) {
                    flashSkillId = null;
                }
                if (skill.rank === 12) {
                    skill.rank = 11;
                    playSound('sub');
                } else if (skill.rank > 0) {
                    skill.rank--;
                    playSound('sub');
                }
            }
            render();
        }

        function render() {
            const container = document.getElementById('skillsContainer');
            container.innerHTML = '';
            const spent = getPointsSpent();
            document.getElementById('pointsRemaining').textContent = `${MAX_POINTS - spent} / ${MAX_POINTS}`;

            const label = document.querySelector('.points-label-small');
            if (spent >= MAX_POINTS) {
                label.classList.add('maniacal-glow');
            } else {
                label.classList.remove('maniacal-glow');
            }

            classes[activeClassIndex].skills.forEach(skill => {
                const isMax = skill.rank === 12;
                const isFlashing = skill.id === flashSkillId;
                const isActive = skill.rank > 0;
                const canAdd = (skill.rank < 11 && (MAX_POINTS - spent) >= 1) || (skill.rank === 11 && (MAX_POINTS - spent) >= 4);
                const card = document.createElement('div');
                card.className = `skill-card ${isMax ? 'max-flash-static' : ''} ${isFlashing ? 'max-flash' : ''}`;
                card.setAttribute('data-skill-id', skill.id);
                card.innerHTML = `
                    <div class="skill-header">
                        <div class="skill-name">
                            ${skill.name}
                            <div class="skill-flavor-top">${skill.flavor || ''}</div>
                        </div>
                        <div class="rank-badge ${isMax ? 'max' : (isActive ? 'active' : '')}">RANK ${skill.rank} / 12</div>
                    </div>
                    <div class="rank-controls">
                        <button class="control-btn" onclick="updateRank('${skill.id}', -1)" ${skill.rank === 0 ? 'disabled' : ''}>-</button>
                        <button class="control-btn" onclick="updateRank('${skill.id}', 1)" ${!canAdd ? 'disabled' : ''}>+</button>
                        <div class="skill-metadata-right">
                            <div class="skill-type-tag">${skill.type}</div>
                            <div class="skill-cost-tag">${skill.cost || ''}</div>
                        </div>
                    </div>
                    <div class="skill-desc">${skill.getDesc(Math.min(skill.rank, 11))}</div>
                    <div class="capstone-box ${isMax ? 'unlocked' : ''}">
                        <div class="capstone-title">${skill.capName}</div>
                        <div class="capstone-info">${skill.capDesc}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderUtilities() {
            const container = document.getElementById('utilityContainer');
            container.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const box = document.createElement('div');
                box.className = 'utility-box';
                let options = '<option value="-1">Empty Focus</option>';
                skillData.forEach((s, idx) => {
                    options += `<option value="${idx}" ${selectedSkills[i] == idx ? 'selected' : ''}>${s.name}</option>`;
                });
                const info = selectedSkills[i] != null && selectedSkills[i] != -1 ? skillData[selectedSkills[i]] : null;
                const isLeg = legendaryStates[i];
                box.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:0.7rem; font-weight:900; color:var(--accent-blood);">SLOT ${i+1}</span>
                        <label style="font-size:0.7rem; color:var(--royal-gold); cursor:pointer;">
                            <input type="checkbox" ${isLeg ? 'checked' : ''} onchange="toggleLeg(${i})" ${info ? '' : 'disabled'}> LEG 120.0
                        </label>
                    </div>
                    <select class="util-select-v2" onchange="setUtil(${i}, this.value)">${options}</select>
                    <div style="font-size:0.85rem; margin-top:10px; color:rgba(255,255,255,0.7);">
                        ${info ? `<div><strong>100.0:</strong> ${info.gm}</div>${isLeg ? `<div class="effect-leg"><strong>120.0 Bonus:</strong> ${info.leg}</div>` : ''}` : 'Select focus skill.'}
                    </div>
                `;
                container.appendChild(box);
            }
        }

        function setUtil(slot, val) { selectedSkills[slot] = val == -1 ? null : val; renderUtilities(); }
        function toggleLeg(slot) { legendaryStates[slot] = !legendaryStates[slot]; renderUtilities(); }
        function resetPoints() { 
            classes[activeClassIndex].skills.forEach(s => s.rank = 0); 
            playSound('reset');
            render(); 
        }
        function resetEverything() { 
            classes.forEach(c => c.skills.forEach(s => s.rank = 0)); 
            selectedSkills = [null,null,null,null,null]; 
            legendaryStates = [false,false,false,false,false]; 
            playSound('reset');
            render(); 
            renderUtilities(); 
        }

        let isMuted = false;
        function toggleMute() {
            const music = document.getElementById('bgMusic');
            const btn = document.getElementById('muteBtn');
            isMuted = !isMuted;
            music.muted = isMuted;
            btn.textContent = isMuted ? '🔇' : '🔊';
        }

        window.onload = () => {
            init();
            
            // Background Music Setup
            const music = document.getElementById('bgMusic');
            music.volume = 0.3;
            
            // Interaction to start music (browser policy)
            const startMusic = () => {
                music.play().catch(() => {});
                document.removeEventListener('click', startMusic);
            };
            document.addEventListener('click', startMusic);
        };
    </script>
