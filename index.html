<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra Fatalis | PvM Class Calculator</title>
    <link rel="icon" type="image/png" href="Assets/tf-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030303;
            --text-color: #ffffff;
            --accent-blood: #ff2d2d;
            --accent-blood-glow: rgba(255, 45, 45, 0.5);
            --royal-gold: #D4AF37;
            --royal-gold-glow: rgba(212, 175, 55, 0.4);
            --card-bg: rgba(10, 10, 10, 0.85);
            --card-border: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(7, 7, 7, 0.92);
            --font-main: 'Inter', sans-serif;
            --font-heading: 'Outfit', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            outline: none;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: url('Assets/background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }



        /* THEME BACKGROUND VIDEO */
        .bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -3;
            object-fit: cover;
            opacity: 0.6;
            filter: brightness(0.7) contrast(1.2);
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(3, 3, 3, 0.4) 40%, rgba(3, 3, 3, 0.9) 100%);
            z-index: -2;
            pointer-events: none;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 40px 20px 100px;
            width: 100%;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 60px;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 40px;
        }

        .logo {
            max-width: 500px;
            filter: drop-shadow(0 0 20px var(--accent-blood-glow));
            transition: var(--transition);
        }

        .header-icon-small {
            width: 32px;
            height: 32px;
            filter: drop-shadow(0 0 8px var(--accent-blood-glow));
        }

        .sticky-tracker {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(7, 7, 7, 0.98));
            backdrop-filter: blur(30px);
            padding: 10px 40px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        .tracker-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .active-class-badge {
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--accent-blood);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-left: 2px solid var(--accent-blood);
            padding-left: 15px;
        }

        .points-display-main {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .points-val-large {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 900;
            line-height: 1;
            color: var(--accent-blood);
            text-shadow: 0 0 15px var(--accent-blood-glow);
        }

        .points-label-small {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            opacity: 0.7;
            margin-top: 4px;
            transition: var(--transition);
        }

        .points-label-small.maniacal-glow {
            color: var(--accent-blood);
            text-shadow: 0 0 10px var(--accent-blood-glow), 0 0 20px var(--accent-blood);
            opacity: 1;
            font-weight: 900;
            animation: maniacalPulse 1.5s infinite alternate;
        }

        @keyframes maniacalPulse {
            from { transform: scale(1); filter: brightness(1); }
            to { transform: scale(1.1); filter: brightness(1.5); }
        }

        .class-select-box {
            background: #111;
            border: 1px solid var(--card-border);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-family: var(--font-heading);
            cursor: pointer;
            transition: var(--transition);
            font-size: 1rem;
        }

        .btn-system {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .btn-system:hover { border-color: var(--accent-blood); background: rgba(255,45,45,0.1); }

        .btn-reset {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.6);
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-family: var(--font-heading);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            transition: var(--transition);
        }

        .btn-reset:hover {
            border-color: var(--accent-blood);
            color: var(--accent-blood);
            background: rgba(255, 45, 45, 0.05);
        }

        .btn-reset.gold {
            border-color: var(--royal-gold);
            color: var(--royal-gold);
        }

        .section-title {
            font-family: var(--font-heading);
            font-size: 2rem;
            margin: 60px 0 30px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 20px;
            color: #fff;
        }

        .section-title::before {
            content: "";
            width: 40px;
            height: 2px;
            background: var(--accent-blood);
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 30px;
        }

        .skill-card {
            background-image: linear-gradient(rgba(10, 10, 10, 0.7), rgba(10, 10, 10, 0.7)), url('Assets/skill-card-bg-v2.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            backdrop-filter: blur(15px);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 35px;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        /* Flash Layer - Freed from resting state */
        .skill-card::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('Assets/skill-card-bg-v2.png');
            background-size: cover;
            background-position: center;
            opacity: 0;
            z-index: 1;
            pointer-events: none;
            border-radius: 28px;
            transition: opacity 0.3s ease;
        }

        .skill-card.max-flash::after {
            animation: cardFreedFlash 1.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        @keyframes cardFreedFlash {
            0% { opacity: 0; filter: brightness(1) contrast(1); transform: scale(1); }
            15% { opacity: 1; filter: brightness(2) contrast(1.2); transform: scale(1.02); }
            100% { opacity: 0; filter: brightness(1) contrast(1); transform: scale(1); }
        }

        /* Subtle glow on the card itself during flash */
        .skill-card.max-flash {
            animation: cardGlowBurst 1.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        @keyframes cardGlowBurst {
            0% { border-color: var(--card-border); box-shadow: 0 0 0 rgba(255, 255, 255, 0); }
            15% { border-color: rgba(255, 255, 255, 0.6); box-shadow: 0 0 30px rgba(255, 255, 255, 0.3); }
            100% { border-color: var(--card-border); box-shadow: 0 0 0 rgba(255, 255, 255, 0); }
        }

        /* Ensure content stays above the flash layer */
        .skill-header, .rank-controls, .skill-desc, .capstone-box {
            position: relative;
            z-index: 2;
        }

        .skill-card:hover {
            transform: translateY(-5px) scale(1.01);
            border-color: rgba(255, 45, 45, 0.3);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .skill-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .skill-name {
            font-family: var(--font-heading);
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        .skill-flavor-top {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            letter-spacing: 0.05em;
            margin-top: 4px;
            font-family: var(--font-main);
            text-transform: none;
        }

        .rank-badge {
            background: #151515;
            padding: 6px 14px;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 0.9rem;
            color: var(--accent-blood);
        }

        .rank-badge.active {
            color: var(--royal-gold);
            border-color: var(--royal-gold);
            box-shadow: 0 0 10px var(--royal-gold-glow);
        }

        .rank-badge.max {
            color: #fff;
            background: var(--royal-gold);
            border-color: var(--royal-gold);
            box-shadow: 0 0 20px var(--royal-gold-glow);
        }

        .rank-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            position: relative;
        }

        .skill-metadata-right {
            margin-left: auto;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .skill-type-tag {
            font-size: 0.7rem;
            font-weight: 900;
            color: var(--accent-blood);
            text-transform: uppercase;
        }

        .skill-cost-tag {
            font-size: 0.75rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            font-family: var(--font-main);
        }

        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03);
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover:not(:disabled) {
            background: var(--accent-blood);
            border-color: var(--accent-blood);
            box-shadow: 0 0 15px var(--accent-blood-glow);
        }

        .control-btn:disabled {
            opacity: 0.1;
            cursor: not-allowed;
        }

        .skill-desc {
            font-size: 1rem;
            line-height: 1.6;
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
            min-height: 4.8em;
        }

        .val-hl { color: var(--accent-blood); font-weight: 700; }

        .capstone-box {
            margin-top: auto;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 20px;
            padding: 22px;
            transition: var(--transition);
        }

        .capstone-box.unlocked {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(0,0,0,0));
            border: 1px solid var(--royal-gold);
            box-shadow: inset 0 0 25px rgba(212, 175, 55, 0.05);
        }

        .capstone-title {
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--royal-gold);
            margin-bottom: 8px;
        }

        .utility-box {
            background: var(--glass-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: var(--transition);
        }

        .util-select-v2 {
            width: 100%;
            background: #0a0a0a;
            color: #fff;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            font-family: var(--font-heading);
            font-weight: 600;
        }

        .effect-leg { 
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            margin-top: 10px;
            padding-top: 10px;
            color: var(--royal-gold);
            font-weight: 600;
        }

        footer {
            margin-top: 100px;
            padding: 60px;
            text-align: center;
        }

        @media (max-width: 900px) {
            .container { padding: 10px 10px 100px; }
            
            .logo { max-width: 180px; }
            .logo-container { margin-bottom: 20px; }
            .header-icon-small { width: 24px; height: 24px; }

            .sticky-tracker { 
                flex-direction: row; 
                flex-wrap: wrap;
                gap: 10px; 
                padding: 10px 15px;
                justify-content: space-between;
            }
            
            .tracker-left { 
                flex-direction: row; 
                width: auto;
                gap: 8px;
                flex: 1;
            }
            
            .class-select-box { 
                padding: 6px 10px;
                font-size: 0.85rem;
                flex: 1;
            }

            .btn-reset { 
                padding: 6px 10px;
                font-size: 0.7rem;
                width: auto;
            }

            .btn-system {
                padding: 6px 8px;
                font-size: 0.8rem;
            }

            .points-display-main { 
                align-items: flex-end; 
                width: auto;
                border-top: none;
                padding-top: 0;
            }
            
            .points-val-large { font-size: 1.4rem; }
            .points-label-small { font-size: 0.5rem; letter-spacing: 0.1em; }

            .section-title { 
                font-size: 1.2rem; 
                margin: 20px 0 15px;
            }
            
            .section-title::before { display: none; }

            .skills-grid { 
                grid-template-columns: 1fr; 
                gap: 15px;
            }

            .skill-card { padding: 25px; border-radius: 20px; }
            
            .skill-name { font-size: 1.3rem; }
            
            .rank-controls { gap: 10px; }
            
            .control-btn { width: 44px; height: 44px; }
        }

        /* Support for very small screens */
        @media (max-width: 480px) {
            .points-val-large { font-size: 1.8rem; }
            .logo { max-width: 260px; }
        }
    </style>
</head>

<body>

    <div class="bg-overlay"></div>

    <!-- STICKY HEADER AT TOP -->
    <div class="sticky-tracker">
        <div class="tracker-left">
            <img src="Assets/tf-icon.png" alt="Icon" class="header-icon-small">
            <select id="classSelect" class="class-select-box" onchange="changeClass()"></select>
            <button class="btn-reset gold" onclick="resetEverything()">Global Reset</button>
            <button id="muteBtn" class="btn-system" onclick="toggleMute()" title="Toggle Music">🔊</button>
        </div>
        
        <div class="points-display-main">
            <div class="points-val-large" id="pointsRemaining">50 / 50</div>
            <div class="points-label-small">Maniacal Energy</div>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="logo-container">
                <img src="Assets/tf-logo.png" alt="Terra Fatalis" class="logo">
            </div>
        </header>

        <audio id="bgMusic" loop>
            <source src="Assets/Terra Fatalis Instrumental.mp3" type="audio/mpeg">
        </audio>

        <audio id="unlockSound">
            <source src="Assets/Unlock.mp3" type="audio/mpeg">
        </audio>

        <div class="section-title">Core Disciplines</div>
        <div class="skills-grid" id="skillsContainer"></div>

        <div class="section-title">Sacred Specializations</div>
        <div class="skills-grid" id="utilityContainer"></div>

        <footer>
            <div style="font-size: 0.7rem; letter-spacing: 0.4em; opacity: 0.4; text-transform: uppercase;">Terra Fatalis &copy; 2026</div>
        </footer>
    </div>

    <script>
        const MAX_POINTS = 50;
                                const classes = [
            {
                name: "Arcanist", archetype: "staff/leather caster",
                skills: [
                    { id: "arc_s1", name: "Arcane Nova", type: ".s1 Active", flavor: "AoE burst. Fire and Energy (Split) Damage", cost: "Cost: 25 Mana", getDesc: (r) => `ability damage <span class="val-hl">+${r * 3}%</span>; radius +0.1 per rank (max +1); CD <span class="val-hl">${(14.5 - (r * 0.5)).toFixed(1)}s</span>.`, capName: "Supernova", capDesc: "Arcane Nova pulls nearby creatures slightly inward and leaves a residual field that applies Fire DoT for 20% of the initial damage over 4s.", rank: 0 },
                    { id: "arc_s2", name: "Elemental Surge", type: ".s2 Active", flavor: "timed buff", cost: "Cost: 15 Mana", getDesc: (r) => `ability damage <span class="val-hl">+${r * 2}%</span> for 10s; mana cost of spells increases by <span class="val-hl">${(r * 1) > 0 ? "+" : ""}${r * 1}%</span> (risk trade); CD <span class="val-hl">${(14.5 - (r * 0.5)).toFixed(1)}s</span>.`, capName: "Stormweaver", capDesc: "Casting during Elemental Surge reduces the remaining cooldown of Arcane Nova and Blink by 0.5s per spell cast.", rank: 0 },
                    { id: "arc_s3", name: "Blink", type: ".s3 Active", flavor: "mobility", cost: "Cost: 15 Mana", getDesc: (r) => `blink range <span class="val-hl">${(r * +0.2).toFixed(1)}</span> tiles (max +2 tiles); CD <span class="val-hl">${(9.5 - (r * 0.5)).toFixed(1)}s</span>.`, capName: "Mirror Image", capDesc: "Instead of a simple decoy, Blink leaves two functional mirror images that cast weak copies of your offensive spells for 4s before detonating for minor area Cold damage.", rank: 0 },
                    { id: "arc_p1", name: "Elemental Affinity", type: "Passive", flavor: "element damage", cost: "", getDesc: (r) => `fire, cold, and energy spell damage vs creatures increases by <span class="val-hl">${(r * 1) > 0 ? "+" : ""}${r * 1}%</span> (max 11%).`, capName: "Elemental Resonance", capDesc: "Casting different elements in sequence grants +20% damage to the next spell (PvM only, 8s window).", rank: 0 },
                    { id: "arc_p2", name: "Quick Casting", type: "Passive", flavor: "cast delay", cost: "", getDesc: (r) => `circle cast delay vs creatures reduced by <span class="val-hl">${(r * 1) > 0 ? "+" : ""}${r * 1}%</span> (applied to Sphere circle delays, max 11%).`, capName: "Echo Cast", capDesc: "15% chance for circle 1-2 spells to cast twice vs creatures (second cast at 50% damage).", rank: 0 },
                    { id: "arc_p3", name: "Leyline Attunement", type: "Passive", flavor: "mana sustain", cost: "", getDesc: (r) => `+1 mana regen at ranks 3/6/9; passive mana regen increases by <span class="val-hl">${(r * 1) > 0 ? "+" : ""}${r * 1}%</span> while in PvM (max 11%).`, capName: "Mana Well", capDesc: "After standing still for 3s, passive mana regen doubles until moving (PvM only).", rank: 0 }
                ]
            },
            {
                name: "Berzerker", archetype: "2H melee",
                skills: [
                    { id: "ber_s1", name: "Whirlwind Strike", type: ".s1 Active", flavor: "AoE melee — Pack Bonus. Physical (Scales with Weapon Tier) Damage", cost: "Cost: 20 Stamina", getDesc: (r) => `ability damage <span class="val-hl">+${r * 3}%</span>; CD <span class="val-hl">${(14.5 - (r * 0.5)).toFixed(1)}s</span>; each creature hit beyond the first increases damage dealt to all targets by <span class="val-hl">${(r * 1) > 0 ? "+" : ""}${r * 1}%</span> (Pack Bonus, max +11% at rank 11).`, capName: "Vortex", capDesc: "Whirlwind pulls creatures within 3 tiles inward before striking. Refunds 1s of cooldown per creature hit up to 4s total.", rank: 0 },
                    { id: "ber_s2", name: "Bloodlust", type: ".s2 Active", flavor: "self buff", cost: "Cost: 10 HP", getDesc: (r) => `ability damage <span class="val-hl">+${r * 4}%</span> to melee and physical attacks for 8s; CD <span class="val-hl">${(19 - (r * 1)).toFixed(1)}s</span>.`, capName: "Bloodbath", capDesc: "During Bloodlust, weapon critical hits or abilities vs creatures reduce all active cooldowns by 1s (ICD 2s).", rank: 0 },
                    { id: "ber_s3", name: "Brutal Leap", type: ".s3 Active", flavor: "gap close + Frenzy ignition. Physical (Scales with Weapon Tier) Damage", cost: "Cost: 15 Stamina", getDesc: (r) => `leap range <span class="val-hl">${(r * +0.2).toFixed(1)}</span> tiles (cap +2 tiles); grants Frenzy stacks on landing scaling with rank (ranks 1-3: 1 stack, ranks 4-6: 2 stacks, ranks 7-9: 3 stacks, ranks 10+: 4 stacks); short interrupt on landing prevents immediate retaliation; CD <span class="val-hl">${(14.5 - (r * 0.5)).toFixed(1)}s</span>.`, capName: "Savage Impact", capDesc: "If landing with 4 or more Frenzy stacks carried from a previous target, the landing hit is an automatic critical strike.", rank: 0 },

        function init() {
            const select = document.getElementById('classSelect');
            classes.forEach((c, idx) => {

                opt.value = idx;
                opt.textContent = c.name;
                select.appendChild(opt);

            render();
            renderUtilities();
        }

        function changeClass() {
            activeClassIndex = parseInt(document.getElementById('classSelect').value);
            render();
        }

        function getPointsSpent() {
            let spent = 0;
            classes[activeClassIndex].skills.forEach(s => {
                if (s.rank <= 11) spent += s.rank;
                else spent += 15;
            });
            return spent;
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (type === 'lock') {
                const snd = document.getElementById('unlockSound');
                if (snd) {
                    snd.volume = 0.3;
                    snd.currentTime = 0;
                    snd.play().catch(() => {});
                }
                return;
            }

            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            if (type === 'add') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            } else if (type === 'sub') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.05);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            } else if (type === 'reset') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            }

            osc.start(now);
            osc.stop(now + 0.1);
        }

        let flashSkillId = null;
        function updateRank(skillId, delta) {
            const skill = classes[activeClassIndex].skills.find(s => s.id === skillId);
            const totalSpent = getPointsSpent();
            const available = MAX_POINTS - totalSpent;

            if (delta > 0) {
                if (skill.rank < 11 && available >= 1) {
                    skill.rank++;
                    playSound('add');
                } else if (skill.rank === 11 && available >= 4) {
                    skill.rank = 12;
                    playSound('lock');
                    flashSkillId = skillId;
                    setTimeout(() => { flashSkillId = null; }, 1500);
                }
            } else {
                if (skill.rank === 12) {
                    skill.rank = 11;
                    playSound('sub');
                } else if (skill.rank > 0) {
                    skill.rank--;
                    playSound('sub');
                }
            }
            render();
        }

        function render() {
            const container = document.getElementById('skillsContainer');
            container.innerHTML = '';
            const spent = getPointsSpent();
            document.getElementById('pointsRemaining').textContent = `${MAX_POINTS - spent} / ${MAX_POINTS}`;

            const label = document.querySelector('.points-label-small');
            if (spent >= MAX_POINTS) {
                label.classList.add('maniacal-glow');
            } else {
                label.classList.remove('maniacal-glow');
            }

            classes[activeClassIndex].skills.forEach(skill => {
                const isMax = skill.rank === 12;
                const isFlashing = skill.id === flashSkillId;
                const isActive = skill.rank > 0;
                const canAdd = (skill.rank < 11 && (MAX_POINTS - spent) >= 1) || (skill.rank === 11 && (MAX_POINTS - spent) >= 4);
                const card = document.createElement('div');
                card.className = `skill-card ${isMax ? 'max-flash-static' : ''} ${isFlashing ? 'max-flash' : ''}`;
                card.setAttribute('data-skill-id', skill.id);
                card.innerHTML = `
                    <div class="skill-header">
                        <div class="skill-name">
                            ${skill.name}
                            <div class="skill-flavor-top">${skill.flavor || ''}</div>
                        </div>
                        <div class="rank-badge ${isMax ? 'max' : (isActive ? 'active' : '')}">RANK ${skill.rank} / 12</div>
                    </div>
                    <div class="rank-controls">
                        <button class="control-btn" onclick="updateRank('${skill.id}', -1)" ${skill.rank === 0 ? 'disabled' : ''}>-</button>
                        <button class="control-btn" onclick="updateRank('${skill.id}', 1)" ${!canAdd ? 'disabled' : ''}>+</button>
                        <div class="skill-metadata-right">
                            <div class="skill-type-tag">${skill.type}</div>
                            <div class="skill-cost-tag">${skill.cost || ''}</div>
                        </div>
                    </div>
                    <div class="skill-desc">${skill.getDesc(Math.min(skill.rank, 11))}</div>
                    <div class="capstone-box ${isMax ? 'unlocked' : ''}">
                        <div class="capstone-title">${skill.capName}</div>
                        <div class="capstone-info">${skill.capDesc}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

                const isLeg = legendaryStates[i];
                box.innerHTML = `

                    </div>
                `;
                container.appendChild(box);
            }

            // Interaction to start music (browser policy)
            const startMusic = () => {
                music.play().catch(() => {});
                document.removeEventListener('click', startMusic);
            };
            document.addEventListener('click', startMusic);
        };
    </script>
</body>
